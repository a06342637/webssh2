services:
  webssh:
    build: .
    container_name: webssh
    restart: unless-stopped
    ports:
      - "${PORT:-8888}:${PORT:-8888}"
    environment:
      - port=${PORT:-8888}
      - savePass=${SAVE_PASS:-true}
      # Uncomment to enable basic auth for the web UI:
      # - authInfo=admin:your_password
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-8888}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
