services:
  webssh:
    build: .
    container_name: webssh
    restart: unless-stopped
    ports:
      - "${PORT:-8008}:${PORT:-8008}"
    environment:
      - port=${PORT:-8008}
      - savePass=${SAVE_PASS:-true}
      - showFooter=${SHOW_FOOTER:-true}
      - WEBSSH_DATA_DIR=/app/data
      - WEBSSH_ADMIN_USER=${WEBSSH_ADMIN_USER:-admin}
      - WEBSSH_ADMIN_PASSWORD=${WEBSSH_ADMIN_PASSWORD:-}
      - WEBSSH_ADMIN_RESET=${WEBSSH_ADMIN_RESET:-false}
      - WEBSSH_ENABLE_SELF_UPDATE=${WEBSSH_ENABLE_SELF_UPDATE:-true}
      - WEBSSH_TERMINAL_WS_URL=${WEBSSH_TERMINAL_WS_URL:-}
      # Uncomment to enable basic auth for the web UI:
      # - authInfo=admin:your_password
    env_file:
      - path: .env
        required: false
    volumes:
      - webssh_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-8008}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  webssh_data:

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd42:7765:6273:7368::/64
